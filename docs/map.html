<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>roadgraph_builder — map (OSM tiles)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      #map {
        height: calc(100% - 52px);
        width: 100%;
      }
      .bar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        background: #0f172a;
        color: #f8fafc;
        flex-wrap: wrap;
      }
      .bar a {
        color: #7dd3fc;
      }
      select {
        font: inherit;
        padding: 4px 8px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="bar">
      <strong>roadgraph_builder</strong>
      <span style="opacity: 0.85">Trajectory + graph on OpenStreetMap tiles (WGS84)</span>
      <label>
        Layer
        <select id="dataset">
          <option value="osm">OSM sample (Berlin area)</option>
          <option value="toy">Toy (synthetic meters → map)</option>
        </select>
      </label>
      <a href="index.html">Diagram viewer</a>
      <a id="repo" href="#">GitHub</a>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      const map = L.map("map", { zoomControl: true });
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      }).addTo(map);

      let layerGroup = L.layerGroup().addTo(map);

      function styleLine(f) {
        const k = f.properties && f.properties.kind;
        if (k === "trajectory") {
          return { color: "#2563eb", weight: 4, opacity: 0.75 };
        }
        if (k === "centerline") {
          return { color: "#ea580c", weight: 5, opacity: 0.9 };
        }
        return { color: "#64748b", weight: 2 };
      }

      function pointLayer(f, latlng) {
        if (f.properties && f.properties.kind === "node") {
          return L.circleMarker(latlng, {
            radius: 6,
            fillColor: "#b91c1c",
            color: "#fff",
            weight: 2,
            opacity: 1,
            fillOpacity: 0.95,
          });
        }
        return L.marker(latlng);
      }

      async function loadGeo(path) {
        const res = await fetch(path);
        if (!res.ok) throw new Error(path + " " + res.status);
        return res.json();
      }

      async function show(which) {
        layerGroup.clearLayers();
        const url = which === "toy" ? "assets/map_toy.geojson" : "assets/map_osm.geojson";
        const data = await loadGeo(url);
        const gj = L.geoJSON(data, {
          style: styleLine,
          pointToLayer: pointLayer,
          onEachFeature: (f, layer) => {
            const p = f.properties || {};
            if (p.kind === "node" && p.node_id) {
              layer.bindPopup(String(p.node_id) + (p.degree != null ? "<br>degree: " + p.degree : ""));
            }
          },
        });
        layerGroup.addLayer(gj);
        const b = gj.getBounds();
        if (b.isValid()) {
          map.fitBounds(b, { padding: [28, 28], maxZoom: 17 });
        } else {
          map.setView([52.52, 13.41], 12);
        }
      }

      document.getElementById("dataset").addEventListener("change", (e) => {
        show(e.target.value).catch((err) => alert(String(err)));
      });

      fetch("assets/site.json")
        .then((r) => r.json())
        .then((s) => {
          const a = document.getElementById("repo");
          if (s.repository_url) a.href = s.repository_url;
        })
        .catch(() => {});

      show("osm").catch((err) => {
        document.querySelector(".bar").appendChild(document.createTextNode(" Load error: " + err));
      });
    </script>
  </body>
</html>
