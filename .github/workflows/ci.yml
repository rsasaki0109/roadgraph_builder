name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Opt into Node.js 24 for JavaScript actions ahead of the 2026-06-02
# GitHub Actions runner switch. actions/checkout@v4 and
# actions/setup-python@v5 currently run on Node 20 and emit deprecation
# warnings unless this flag is set.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: pytest

      - name: Validate example camera detections JSON
        run: roadgraph_builder validate-detections examples/camera_detections_sample.json

      - name: Validate example turn restrictions JSON
        run: roadgraph_builder validate-turn-restrictions examples/turn_restrictions_sample.json

      - name: Inspect example LAS header
        run: roadgraph_builder inspect-lidar examples/sample_lidar.las

      - name: Doctor self-check
        run: roadgraph_builder doctor

      - name: Validate bundled graph JSON (GitHub Pages assets)
        run: |
          roadgraph_builder validate docs/assets/sample_graph.json
          roadgraph_builder validate docs/assets/osm_graph.json

      - name: export-bundle + validate bundle outputs
        run: |
          roadgraph_builder export-bundle examples/sample_trajectory.csv /tmp/rg_bundle \
            --origin-json examples/toy_map_origin.json \
            --lane-width-m 3.5 \
            --turn-restrictions-json examples/turn_restrictions_sample.json
          roadgraph_builder validate-sd-nav /tmp/rg_bundle/nav/sd_nav.json
          roadgraph_builder validate /tmp/rg_bundle/sim/road_graph.json
          roadgraph_builder validate-manifest /tmp/rg_bundle/manifest.json
