# Release workflow: runs only on tag push (v*). Builds the sample bundle via
# scripts/build_release_bundle.sh and attaches the tar.gz + sha256 to the
# matching GitHub Release.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build sample bundle
        run: bash scripts/build_release_bundle.sh

      - name: Create release with artifacts
        # Pinned to a concrete release tag, not @main.
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/roadgraph_sample_bundle.tar.gz
            dist/roadgraph_sample_bundle.sha256
          generate_release_notes: true
