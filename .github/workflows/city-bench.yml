name: City-scale OSM regression

# Manual trigger only — not run on push or schedule.
# Usage: Actions → City-scale OSM regression → Run workflow
on:
  workflow_dispatch:
    inputs:
      city:
        description: "City filter (leave blank for all three)"
        required: false
        default: ""
      overpass_endpoint:
        description: "Overpass API endpoint (default: overpass-api.de)"
        required: false
        default: "https://overpass-api.de/api/interpreter"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

jobs:
  city-bench:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run city-scale tests
        env:
          OVERPASS_ENDPOINT: ${{ github.event.inputs.overpass_endpoint }}
        run: |
          FILTER=""
          if [ -n "${{ github.event.inputs.city }}" ]; then
            FILTER="-k ${{ github.event.inputs.city }}"
          fi
          pytest -m city_scale $FILTER --no-header -v \
            --tb=short \
            --timeout=1800 \
            2>&1 | tee /tmp/city_bench_output.txt

      - name: Upload bundle artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: city-bench-bundles
          path: /tmp/pytest-*/test_city_*/
          retention-days: 7

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: city-bench-output
          path: /tmp/city_bench_output.txt
          retention-days: 7
